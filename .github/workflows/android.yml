name: Build DuckMC Launcher APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew assembleDebug -x test
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: DuckMC-Launcher-Debug
        path: FCL/build/outputs/apk/debug/
    
    - name: Create Release
      uses: actions/create-release@v1
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.0.0-${{ github.run_number }}
        release_name: DuckMC Launcher Build ${{ github.run_number }}
        body: |
          Automated build of DuckMC Launcher
          Build #${{ github.run_number }}
        draft: false
        prerelease: true
